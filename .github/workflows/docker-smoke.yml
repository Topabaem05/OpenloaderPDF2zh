name: Docker Smoke

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare local mounts
        run: mkdir -p workspace resources/models/quickmt

      - name: Render docker compose config
        run: docker compose config > /tmp/docker-compose.rendered.yml

      - name: Start container
        run: docker compose up --build -d

      - name: Wait for FastAPI and Gradio
        run: |
          set -euo pipefail
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:7860/api/health >/dev/null \
              && curl -fsS http://127.0.0.1:7860/gradio/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Verify workspace bind mount
        run: |
          set -euo pipefail
          docker compose exec -T app sh -lc 'printf action-smoke > /app/workspace/action-smoke.txt'
          test -f workspace/action-smoke.txt

      - name: Stop container
        if: always()
        run: docker compose down -v
